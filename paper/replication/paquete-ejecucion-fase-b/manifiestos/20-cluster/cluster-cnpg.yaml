# Cluster CloudNativePG 1.28.0 -- PostgreSQL 16.13, 3 instancias.
# Requiere el operador CNPG 1.28.0 ya instalado (namespace cnpg-operator, verificado 2026-07-05).
# StorageClass resuelta: huawei-ch-xfs (csi.huawei.com, FC/SAN). Nodo del lab: tcolp293.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pglab-cnpg-exp
  namespace: pg-chaos-lab
  labels:
    app.kubernetes.io/part-of: pg-chaos-lab
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16.13   # importar via ctr en nodos del lab
  primaryUpdateStrategy: unsupervised

  # Propagar metadatos a los pods de Postgres: excluirlos del service mesh Linkerd
  # (coincide con produccion; evita el sidecar en la ruta de datos durante la medicion).
  inheritedMetadata:
    annotations:
      linkerd.io/inject: disabled

  # Semantica de replicacion: asincrona (por defecto). El eje experimental
  # es operador x escenario x latencia; no se varia la sincronia (opcion a).
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: 256MB
      # Facilita el calculo de RPO/consistencia en los logs:
      log_min_duration_statement: "1000"

  bootstrap:
    initdb:
      database: labdb
      owner: lab

  storage:
    size: 15Gi
    storageClass: huawei-ch-xfs        # StorageClass real del CSI Huawei (default, csi.huawei.com, Retain, WaitForFirstConsumer)

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 1Gi

  # Confinar al pool del laboratorio (nodos etiquetados pg-chaos-lab/member=true)
  affinity:
    nodeSelector:
      pg-chaos-lab/member: "true"
    # Distribuir instancias en nodos distintos (relevante para F2/F3):
    topologyKey: kubernetes.io/hostname

  monitoring:
    enablePodMonitor: false            # poner true si Prometheus Operator esta disponible
