# Namespace aislado del laboratorio. Etiquetas usadas por RBAC, cuotas,
# politicas Calico y el alcance de Chaos Mesh.
apiVersion: v1
kind: Namespace
metadata:
  name: pg-chaos-lab
  annotations:
    # El laboratorio NO entra en el service mesh Linkerd: coincide con produccion
    # (los namespaces pg-* de CNPG no estan meshados) y evita contaminar la
    # medicion de RTO/latencia con un sidecar linkerd-proxy en la ruta.
    linkerd.io/inject: disabled
  labels:
    app.kubernetes.io/part-of: pg-chaos-lab
    # Requerido si se habilita enableFilterNamespace en Chaos Mesh:
    chaos-mesh.org/inject: enabled
    pod-security.kubernetes.io/enforce: privileged   # chaos-daemon lo requiere; validar con el equipo de seguridad
