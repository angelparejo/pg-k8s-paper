<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 566" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="620" height="566" fill="#ffffff"/>

  <!-- O -->
  <rect x="90" y="26" width="440" height="80" rx="8" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="310" y="58" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">O — Operador (CloudNativePG)</text>
  <text x="310" y="82" text-anchor="middle" font-size="13" fill="#334155">detección de líder · promoción · reconciliación</text>

  <!-- arrow O -> K -->
  <line x1="310" y1="106" x2="310" y2="154" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="326" y="134" text-anchor="start" font-size="12.5" fill="#334155">coordina ciclo de vida y failover</text>

  <!-- K -->
  <rect x="90" y="156" width="440" height="80" rx="8" fill="#e2e8f0" stroke="#334155" stroke-width="1.5"/>
  <text x="310" y="188" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">K — Plano de control de Kubernetes</text>
  <text x="310" y="212" text-anchor="middle" font-size="13" fill="#334155">kubelet · API server · Services / Endpoints</text>

  <!-- arrow K -> D -->
  <line x1="310" y1="236" x2="310" y2="284" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="326" y="264" text-anchor="start" font-size="12.5" fill="#334155">programa pods · enruta escrituras al primario</text>

  <!-- D -->
  <rect x="90" y="286" width="440" height="80" rx="8" fill="#dcfce7" stroke="#166534" stroke-width="1.5"/>
  <text x="310" y="318" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">D — Motor PostgreSQL</text>
  <text x="310" y="342" text-anchor="middle" font-size="13" fill="#334155">transacciones · WAL · replicación</text>

  <!-- arrow D -> M -->
  <line x1="310" y1="366" x2="310" y2="414" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="326" y="394" text-anchor="start" font-size="12.5" fill="#334155">persiste WAL y datos</text>

  <!-- M -->
  <rect x="90" y="416" width="440" height="80" rx="8" fill="#fef3c7" stroke="#92400e" stroke-width="1.5"/>
  <text x="310" y="448" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">M — Almacenamiento CSI (en red / SAN)</text>
  <text x="310" y="472" text-anchor="middle" font-size="13" fill="#334155">PVC / PV · persistencia (política Retain)</text>

  <!-- emergent behavior -->
  <text x="310" y="534" text-anchor="middle" font-size="15" fill="#0f172a">Comportamiento emergente:&#160;&#160;<tspan font-style="italic">I(S) = f(O × K × M × D)</tspan></text>
</svg>
